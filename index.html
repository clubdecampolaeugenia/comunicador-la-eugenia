function verificarPin() {
  const pin = document.getElementById('pinInput').value;
  if (pin === PIN_CORRECTO) {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('pinError').innerText = '';
  } else {
    document.getElementById('pinError').innerText = 'PIN incorrecto. Intentá de nuevo.';
    document.getElementById('pinInput').value = '';
  }
}
document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') verificarPin(); });

let recognition = null, grabando = false;
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Tu navegador no soporta reconocimiento de voz. Usá Chrome o Safari.'); return; }
  if (grabando) { recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'es-AR'; recognition.continuous = true; recognition.interimResults = false;
  recognition.onstart = () => { grabando = true; document.getElementById('micBtn').classList.add('grabando'); document.getElementById('micBtn').innerText = '⏹️'; };
  recognition.onresult = (e) => { const t = Array.from(e.results).map(r => r[0].transcript).join(' '); const ta = document.getElementById('textoEntrada'); ta.value = (ta.value ? ta.value + ' ' : '') + t; };
  recognition.onend = () => { grabando = false; document.getElementById('micBtn').classList.remove('grabando'); document.getElementById('micBtn').innerText = '🎤'; };
  recognition.onerror = () => { grabando = false; document.getElementById('micBtn').classList.remove('grabando'); document.getElementById('micBtn').innerText = '🎤'; };
  recognition.start();
}

async function llamarAPI(mensajes) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': AK, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 1024, system: SYSTEM_PROMPT, messages: mensajes })
  });
  const data = await response.json();
  if (!data.content || !data.content[0]) throw new Error('Sin respuesta');
  return data.content[0].text;
}

async function generarMensaje() {
  const texto = document.getElementById('textoEntrada').value.trim();
  if (!texto) return;
  if (grabando && recognition) recognition.stop();
  document.getElementById('pasoEntrada').style.display = 'none';
  document.getElementById('loadingText').innerText = 'Generando comunicado...';
  try {
    const raw = await llamarAPI([{ role: 'user', content: texto }]);
    mostrarResultado(raw);
  } catch(e) {
    document.getElementById('loadingText').innerText = 'Error al generar. Intentá de nuevo.';
    document.getElementById('pasoEntrada').style.display = 'block';
  }
}

function mostrarResultado(raw) {
  const clean = raw.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  document.getElementById('loadingText').innerText = '';
  document.getElementById('categoriaBadge').innerText = parsed.categoria;
  document.getElementById('resultadoBox').innerText = parsed.mensaje;
  document.getElementById('resultadoBox').style.display = 'block';

  if (parsed.advertencia && parsed.advertencia.trim() !== '') {
    document.getElementById('advertenciaBox').innerText = '⚠️ ' + parsed.advertencia;
    document.getElementById('advertenciaBox').style.display = 'block';
  } else {
    document.getElementById('advertenciaBox').style.display = 'none';
  }

  const sugs = (parsed.sugerencias || []).filter(s => DIRECTORIO.find(d => d.nombre === s));
  if (sugs.length > 0) {
    const lista = document.getElementById('sugerenciasLista');
    lista.innerHTML = '';
    sugs.forEach((s, i) => {
      const d = DIRECTORIO.find(x => x.nombre === s);
      const item = document.createElement('div');
      item.className = 'sugerencia-item';
      item.innerHTML = `<input type="checkbox" id="sug${i}" data-nombre="${d.nombre}" data-valor="${d.valor}" data-texto="${d.texto}">
        <label class="sugerencia-label" for="sug${i}">
          <strong>${d.nombre}</strong>
          <span>${d.valor}</span>
        </label>`;
      lista.appendChild(item);
    });
    document.getElementById('sugerenciasBox').style.display = 'block';
  } else {
    document.getElementById('sugerenciasBox').style.display = 'none';
  }

  const msgEncoded = encodeURIComponent(parsed.mensaje);
  document.getElementById('btnWhatsApp').href = 'https://wa.me/' + WA_NUMERO + '?text=' + msgEncoded;
  document.getElementById('ajusteBox').style.display = 'none';
  document.getElementById('btnAjustar').style.display = 'block';
  document.getElementById('pasoResultado').style.display = 'block';
}

function aplicarSugerencias() {
  const checks = document.querySelectorAll('#sugerenciasLista input[type=checkbox]:checked');
  if (checks.length === 0) { alert('Tildá al menos un dato para agregar.'); return; }
  const partes = Array.from(checks).map(c => `${c.dataset.texto}: ${c.dataset.valor}`);
  const instruccion = 'Agregá al final del comunicado, antes del cierre "LA EUGE informa 📣", los siguientes datos con su texto introductorio natural y en el mismo tono del comunicado:\n' + partes.join('\n');
  abrirAjuste(instruccion);
  document.getElementById('sugerenciasBox').style.display = 'none';
}

function abrirAjuste(textoInicial) {
  document.getElementById('ajusteBox').style.display = 'block';
  document.getElementById('btnAjustar').style.display = 'none';
  const ta = document.getElementById('textoAjuste');
  ta.value = textoInicial || '';
  if (!textoInicial) ta.focus();
}
function cerrarAjuste() {
  document.getElementById('ajusteBox').style.display = 'none';
  document.getElementById('btnAjustar').style.display = 'block';
  document.getElementById('textoAjuste').value = '';
}

async function aplicarAjuste() {

  const mensajeActual = document.getElementById('resultadoBox').innerText;
  const textoOriginal = document.getElementById('textoEntrada').value.trim();

  document.getElementById('pasoResultado').style.display = 'none';
  document.getElementById('loadingText').innerText = 'Aplicando ajuste...';
  try {
    const raw = await llamarAPI([
      { role: 'user', content: textoOriginal },
      { role: 'assistant', content: '{"categoria":"...","advertencia":"","sugerencias":[],"mensaje":"' + mensajeActual.replace(/"/g,'\\"').replace(/\n/g,'\\n') + '"}' },
      { role: 'user', content: ajuste }
    ]);
    mostrarResultado(raw);
  } catch(e) {
    document.getElementById('loadingText').innerText = 'Error al ajustar. Intentá de nuevo.';
    document.getElementById('pasoResultado').style.display = 'block';
  }
}

function copiarMensaje() {
  const texto = document.getElementById('resultadoBox').innerText;
  const btn = document.getElementById('btnCopiar');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).then(() => { btn.innerText = '¡Copiado!'; setTimeout(() => { btn.innerText = 'Copiar mensaje'; }, 2000); }).catch(() => copiarFallback(texto, btn));
  } else { copiarFallback(texto, btn); }
}
function copiarFallback(texto, btn) {
  const ta = document.createElement('textarea');
  ta.value = texto; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); btn.innerText = '¡Copiado!'; setTimeout(() => { btn.innerText = 'Copiar mensaje'; }, 2000); }
  catch(e) { btn.innerText = 'Error al copiar'; setTimeout(() => { btn.innerText = 'Copiar mensaje'; }, 2000); }
  document.body.removeChild(ta);
}

function nuevoMensaje() {
  document.getElementById('textoEntrada').value = '';
  document.getElementById('resultadoBox').innerText = '';
  document.getElementById('resultadoBox').style.display = 'none';
  document.getElementById('advertenciaBox').style.display = 'none';
  document.getElementById('sugerenciasBox').style.display = 'none';
  document.getElementById('ajusteBox').style.display = 'none';
  document.getElementById('btnAjustar').style.display = 'block';
  document.getElementById('pasoResultado').style.display = 'none';
  document.getElementById('loadingText').innerText = '';
  document.getElementById('pasoEntrada').style.display = 'block';
}
function cerrarSesion() {
  nuevoMensaje();
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('pinScreen').style.display = 'block';
  document.getElementById('pinInput').value = '';
}
</script>
